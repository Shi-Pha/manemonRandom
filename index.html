<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ガチャ</title>
</head>
<body>

<h1>キャラ使用率準拠ランダム 2026/03
    (アレックス抜き)
</h1>

<h2>クラシック ダイヤ</h2>
<button onclick="draw(gacha1, 'result1')">対戦相手を決定</button>
<p id="result1"></p>

<h2>クラシック マスター</h2>
<button onclick="draw(gacha2, 'result2')">対戦相手を決定</button>
<p id="result2"></p>

<script>
// キャラ名（共通）
const names = [
  "豪鬼","リュウ","ケン","ザンギエフ","ジェイミー","舞","テリー","サガット",
  "エド","ジュリ","キャミィ","ルーク","ベガ","JP","マリーザ","マノン",
  "エレナ","ディージェイ","AKI","春麗","C.ヴァイパー","ガイル",
  "ラシード","ブランカ","キンバリー","エドモンド本田","ダルシム","リリー"
];

// ガチャ①（今の使用率）
const weights1 = [
  8.7,8.0,4.1,3,4.3,3.6,4.2,4.1,
  3.3,3.2,2.8,2.3,2.6,2.8,1.8,1.9,
  1.6,1.6,1.4,1.2,1.2,1.2,
  0.9,0.8,0.8,0.6,0.6,0.5
];

// ガチャ②（全部1：ここを自由に変更OK）
const weights2 = [
    9.1,8.4,5.6,3.2,4.8,3.3,4.7,5,
    3.2,4.7,3.9,3.5,3.6,4.5,2.4,2.4,
    2.3,2.9,2.3,1.9,2.1,1.7,
    1.7,1.4,1.5,1,1,0.5
];

// 配列を合体
function makeGacha(names, weights) {
  return names.map((name, i) => ({
    name: name,
    weight: weights[i]
  }));
}

const gacha1 = makeGacha(names, weights1);
const gacha2 = makeGacha(names, weights2);

// 共通抽選
function draw(gacha, resultId) {
  const total = gacha.reduce((sum, c) => sum + c.weight, 0);
  let r = Math.random() * total;

  for (const c of gacha) {
    r -= c.weight;
    if (r < 0) {
      document.getElementById(resultId).textContent = c.name;
      return;
    }
  }
}
</script>

</body>
</html>
